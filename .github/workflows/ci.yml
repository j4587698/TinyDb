name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore "TinyDb.sln"

      - name: Build
        run: dotnet build "TinyDb.sln" --configuration Release --no-restore

      - name: Test
        run: dotnet test --project "TinyDb.Tests/TinyDb.Tests.csproj" --configuration Release --no-build
